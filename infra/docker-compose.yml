# Development runtime for FaleCom.
#
# Services:
#   - workspace: dev container where all Ruby / Rails / test commands run.
#   - postgres:  shared Postgres 16 for the Rails app + Solid trio.
#
# Channel-related services (app, app-jobs, dev-webhook, whatsapp-cloud, zapi,
# ...) will be added by subsequent specs. Placeholders are intentionally left
# commented out so this file is not churned by unrelated work.

name: falecom

services:
  workspace:
    build:
      context: ../.devcontainer
      dockerfile: workspace.Dockerfile
    volumes:
      - ..:/workspaces/falecom:cached
      - workspace-bundle:/usr/local/bundle
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://falecom:falecom@postgres:5432/falecom_development}
      RAILS_ENV: development
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: falecom
      POSTGRES_PASSWORD: falecom
      POSTGRES_DB: falecom_development
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "falecom"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  dev-webhook:
    build:
      context: ../infra/dev-webhook
    ports:
      - "4000:4000"
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL_SQS: http://localstack:4566
    depends_on:
      localstack:
        condition: service_healthy

  app:
    build:
      context: ../packages/app
    command: bin/rails server -b 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://falecom:falecom@postgres:5432/falecom_development
      FALECOM_DISPATCH_HMAC_SECRET: dev-dispatch-secret
      CHANNEL_WHATSAPP_CLOUD_URL: http://channel-whatsapp-cloud:9292
    depends_on:
      postgres:
        condition: service_healthy

  app-jobs:
    build:
      context: ../packages/app
    command: bin/jobs start
    environment:
      DATABASE_URL: postgres://falecom:falecom@postgres:5432/falecom_development
    depends_on:
      postgres:
        condition: service_healthy

  channel-whatsapp-cloud:
    build:
      context: ../packages/channels/whatsapp-cloud
    environment:
      SQS_QUEUE_NAME: sqs-whatsapp-cloud
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL_SQS: http://localstack:4566
      FALECOM_API_URL: http://app:3000
      FALECOM_DISPATCH_HMAC_SECRET: dev-dispatch-secret
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-dev-placeholder}
    depends_on:
      localstack:
        condition: service_healthy
      app:
        condition: service_started

volumes:
  postgres-data:
  workspace-bundle:
